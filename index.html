// ── Utils ──────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,9); }
function fmtDate(s) { if(!s) return ""; return new Date(s+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function fmtFull(s) { if(!s) return ""; return new Date(s).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }

function getUrgency(task) {
  if(!task.followUpDate || task.status==="done") return "none";
  const diff = Math.floor((new Date(task.followUpDate+"T12:00:00") - new Date(new Date().toDateString())) / 86400000);
  if(diff < 0) return "overdue"; if(diff===0) return "today"; if(diff<=7) return "week"; return "none";
}

function daysFromNow(n) { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; }

function recurDatesInMonth(task, year, month) {
  if(!task.recurrence?.type || !task.followUpDate) return [];
  const start = new Date(task.followUpDate+"T12:00:00");
  const days  = new Date(year, month+1, 0).getDate();
  const res   = [];
  for(let d=1; d<=days; d++) {
    const date = new Date(year, month, d);
    const diff = Math.floor((date - start) / 86400000);
    if(diff < 0) continue;
    const { type } = task.recurrence;
    if(type==="daily") res.push(d);
    else if(type==="weekly"   && diff%7===0)  res.push(d);
    else if(type==="biweekly" && diff%14===0) res.push(d);
    else if(type==="monthly"  && date.getDate()===start.getDate()) res.push(d);
  }
  return res;
}

function lsGet(key) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ── Editable field ─────────────────────────────────────────────────────────
function Editable({ value, onChange, placeholder="—", multi=false, style={} }) {
  const T = useT();
  const [editing, setEditing] = useState(false);
  const [draft,   setDraft]   = useState(value||"");
  const ref = useRef(null);

  const start = e => { e.stopPropagation(); setDraft(value||""); setEditing(true); setTimeout(()=>ref.current?.focus(),0); };
  const commit = () => { setEditing(false); const t=draft.trim(); if(t!==(value||"")) onChange(t||null); };
  const onKey = e => { e.stopPropagation(); if(e.key==="Escape"){setEditing(false);setDraft(value||"");} if(!multi&&e.key==="Enter"){e.preventDefault();commit();} };

  const inp = { width:"100%", background:T.raised, border:`0.5px solid ${T.borderMd}`, borderRadius:5, padding:"3px 7px", color:T.tx, fontFamily:"inherit", fontSize:"inherit", lineHeight:"inherit", outline:"none", resize:"none" };

  if(editing) return multi
    ? <textarea ref={ref} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={onKey} rows={3} style={inp}/>
    : <input    ref={ref} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={onKey} style={inp}/>;

  return (
    <span onClick={start} className="editable" style={{cursor:"pointer",borderRadius:4,padding:"1px 4px",margin:"0 -4px",color:value?undefined:T.tx3,display:multi?"block":"inline",...style}}>
      {value||placeholder}
    </span>
  );
}

function EditableDate({ value, onChange }) {
  const T = useT();
  const [editing, setEditing] = useState(false);
  const ref = useRef(null);
  const start = e => { e.stopPropagation(); setEditing(true); setTimeout(()=>ref.current?.showPicker?.(),60); };
  if(editing) return <input ref={ref} type="date" defaultValue={value||""} onChange={e=>{onChange(e.target.value||null);setEditing(false);}} onBlur={()=>setEditing(false)} onClick={e=>e.stopPropagation()} style={{fontSize:11,fontFamily:"monospace",border:`0.5px solid ${T.borderMd}`,borderRadius:5,padding:"2px 7px",background:T.raised,color:T.tx,outline:"none"}}/>;
  return <span onClick={start} className="editable" style={{fontSize:12,color:value?T.tx2:T.tx3,fontFamily:"monospace",cursor:"pointer",borderRadius:4,padding:"1px 5px"}}>{value?fmtDate(value):"Set date"}</span>;
}

// ── TaskCard ───────────────────────────────────────────────────────────────
function TaskCard({ task, onUpdate, onStatusChange, onDelete }) {
  const T = useT();
  const [open,       setOpen]       = useState(false);
  const [newSub,     setNewSub]     = useState("");
  const [snoozeOpen, setSnoozeOpen] = useState(false);
  const [blockMsg,   setBlockMsg]   = useState(null);

  const cat      = getCat(T, task.category);
  const urgency  = getUrgency(task);
  const subtasks = task.subtasks||[];
  const doneSubs = subtasks.filter(s=>s.completed).length;
  const pending  = subtasks.length>0 && doneSubs<subtasks.length;

  const urgencyColor = {overdue:T.uOv,today:T.uTd,week:T.uWk,none:T.tx3}[urgency];
  const statusColor  = {not_started:T.sNs,in_progress:T.sIp,done:T.sDone}[task.status||"not_started"];

  const patchSubs = fn => onUpdate({subtasks:fn(subtasks)});

  const tryStatus = s => {
    if(s==="done"&&pending){ setBlockMsg(`${subtasks.length-doneSubs} subtask${subtasks.length-doneSubs!==1?"s":""} still open`); setTimeout(()=>setBlockMsg(null),2500); return; }
    onStatusChange(s);
  };

  const addSub = () => { if(!newSub.trim()) return; patchSubs(p=>[...p,{id:uid(),text:newSub.trim(),completed:false}]); setNewSub(""); };
  const snooze = days => { const d=new Date(); d.setDate(d.getDate()+days); onUpdate({followUpDate:d.toISOString().split("T")[0]}); setSnoozeOpen(false); };

  return (
    <div
      draggable
      onDragStart={e=>{e.dataTransfer.setData("taskId",task.id);e.currentTarget.style.opacity="0.3";}}
      onDragEnd={e=>{e.currentTarget.style.opacity="1";}}
      style={{background:T.card,borderRadius:10,border:`0.5px solid ${T.border}`,borderLeft:`3px solid ${cat.dot}`,marginBottom:8,overflow:"hidden"}}
    >
      {/* Header */}
      <div onClick={()=>setOpen(p=>!p)} style={{padding:"12px 14px",cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:7,alignItems:"baseline",flexWrap:"wrap",marginBottom:3}}>
              {task.company && <span style={{fontSize:13,fontWeight:600,color:T.tx}}>{task.company}</span>}
              {task.contact && <span style={{fontSize:11,color:T.tx2}}>{task.company?`/ ${task.contact}`:task.contact}{task.title?`, ${task.title}`:""}</span>}
              {!task.company&&!task.contact && <span style={{fontSize:12,color:T.tx3,fontStyle:"italic"}}>Internal</span>}
            </div>
            <div style={{fontSize:11,color:cat.c,fontFamily:"monospace",fontWeight:500}}>→ {task.action}</div>
            {subtasks.length>0 && (
              <div style={{display:"flex",alignItems:"center",gap:7,marginTop:6}}>
                <div style={{flex:1,height:2,background:T.surface,borderRadius:1,overflow:"hidden"}}>
                  <div style={{width:`${Math.round(doneSubs/subtasks.length*100)}%`,height:"100%",background:cat.dot,transition:"width 0.4s"}}/>
                </div>
                <span style={{fontSize:9,color:T.tx3,fontFamily:"monospace"}}>{doneSubs}/{subtasks.length}</span>
              </div>
            )}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
            {task.followUpDate && <span style={{fontSize:10,color:urgency!=="none"?urgencyColor:T.tx3,fontFamily:"monospace",fontWeight:urgency!=="none"?600:400}}>{fmtDate(task.followUpDate)}</span>}
            {task.recurrence && <span style={{fontSize:9,color:cat.c,fontFamily:"monospace",opacity:0.85}}>↻ {task.recurrence.label}</span>}
            <span style={{fontSize:9,fontFamily:"monospace",color:statusColor,fontWeight:500}}>{STATUS_CFG[task.status||"not_started"].label}</span>
          </div>
        </div>
      </div>

      {/* Expanded */}
      {open && (
        <div onClick={e=>e.stopPropagation()} style={{borderTop:`0.5px solid ${T.border}`,padding:"14px 14px"}}>
          {/* Fields */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 14px",marginBottom:14,background:T.surface,borderRadius:9,padding:"10px 12px"}}>
            {[{label:"Company",key:"company"},{label:"Contact",key:"contact"},{label:"Title",key:"title"}].map(f=>(
              <div key={f.key}>
                <div style={{fontSize:9,fontFamily:"monospace",color:T.tx3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:3}}>{f.label}</div>
                <div style={{fontSize:12,color:T.tx}}><Editable value={task[f.key]} onChange={v=>onUpdate({[f.key]:v})} placeholder={`Add ${f.label.toLowerCase()}`}/></div>
              </div>
            ))}
            <div>
              <div style={{fontSize:9,fontFamily:"monospace",color:T.tx3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:3}}>Follow-up</div>
              <EditableDate value={task.followUpDate} onChange={v=>onUpdate({followUpDate:v})}/>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <div style={{fontSize:9,fontFamily:"monospace",color:T.tx3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:3}}>Action</div>
              <div style={{fontSize:12,color:cat.c,fontFamily:"monospace",fontWeight:500}}><Editable value={task.action} onChange={v=>onUpdate({action:v||task.action})} placeholder="Next action"/></div>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <div style={{fontSize:9,fontFamily:"monospace",color:T.tx3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:3}}>Notes</div>
              <div style={{fontSize:12,color:T.tx2,lineHeight:1.6}}><Editable value={task.notes} onChange={v=>onUpdate({notes:v})} placeholder="Add context" multi/></div>
            </div>
          </div>

          {/* Status */}
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
            {Object.entries(STATUS_CFG).map(([k,cfg])=>{
              const isA   = (task.status||"not_started")===k;
              const blocked = k==="done"&&pending;
              const sc    = {not_started:T.sNs,in_progress:T.sIp,done:T.sDone}[k];
              return <button key={k} onClick={()=>tryStatus(k)} style={{fontSize:11,padding:"5px 14px",borderRadius:20,cursor:blocked?"not-allowed":"pointer",border:`0.5px solid ${isA?sc:T.border}`,background:isA?`${sc}22`:"transparent",color:isA?sc:T.tx2,opacity:blocked?0.35:1,fontFamily:"monospace",fontWeight:isA?600:400,transition:"all 0.15s"}}>{cfg.label}</button>;
            })}
            {blockMsg && <span style={{fontSize:11,color:T.uOv,fontFamily:"monospace",fontWeight:500}}>⚠ {blockMsg}</span>}
          </div>

          {/* Subtasks */}
          {subtasks.length>0 && (
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,fontFamily:"monospace",color:T.tx3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:9}}>Subtasks</div>
              {subtasks.map(s=>(
                <div key={s.id} style={{display:"flex",alignItems:"flex-start",gap:9,marginBottom:7,paddingBottom:7,borderBottom:`0.5px solid ${T.border}`}}>
                  <input type="checkbox" checked={s.completed} onChange={()=>patchSubs(p=>p.map(x=>x.id===s.id?{...x,completed:!x.completed}:x))} style={{marginTop:2,cursor:"pointer",flexShrink:0,accentColor:cat.dot}}/>
                  <div style={{flex:1,fontSize:12,color:s.completed?T.tx3:T.tx,textDecoration:s.completed?"line-through":"none",lineHeight:1.55}}>
                    <Editable value={s.text} onChange={v=>patchSubs(p=>p.map(x=>x.id===s.id?{...x,text:v||x.text}:x))} style={{color:"inherit",textDecoration:"inherit"}}/>
                  </div>
                  <button onClick={()=>patchSubs(p=>p.filter(x=>x.id!==s.id))} style={{background:"none",border:"none",color:T.tx3,cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>×</button>
                </div>
              ))}
            </div>
          )}

          {/* Add subtask */}
          <div style={{display:"flex",gap:7,marginBottom:12}}>
            <input type="text" value={newSub} onChange={e=>setNewSub(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addSub();e.stopPropagation();}} onClick={e=>e.stopPropagation()} placeholder="Add a subtask…" style={{flex:1,fontSize:12,padding:"6px 10px",borderRadius:7,border:`0.5px solid ${T.border}`,background:T.surface,color:T.tx,fontFamily:"monospace",outline:"none"}}/>
            <button onClick={addSub} disabled={!newSub.trim()} style={{fontSize:11,padding:"5px 13px",borderRadius:20,border:`1px solid ${cat.dot}`,background:"transparent",color:cat.c,cursor:"pointer",fontFamily:"monospace",fontWeight:500}}>+ Add</button>
          </div>

          {/* Actions */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",paddingTop:11,borderTop:`0.5px solid ${T.border}`}}>
            <button type="button" onClick={()=>setSnoozeOpen(p=>!p)} style={{fontSize:11,padding:"5px 13px",borderRadius:20,border:`0.5px solid ${T.border}`,background:"transparent",color:T.tx2,cursor:"pointer",fontFamily:"monospace"}}>⏱ Snooze</button>
            {snoozeOpen&&[1,3,7,14,30].map(d=><button key={d} onClick={()=>snooze(d)} style={{fontSize:11,padding:"4px 10px",borderRadius:20,border:`1px solid ${T.cDeals}`,background:"transparent",color:T.cDeals,cursor:"pointer",fontFamily:"monospace"}}>+{d}d</button>)}
            <select value={task.category} onChange={e=>onUpdate({category:e.target.value})} style={{fontSize:11,fontFamily:"monospace",background:T.surface,border:`0.5px solid ${T.border}`,borderRadius:20,color:T.tx2,padding:"4px 9px",cursor:"pointer"}}>
              {["deals","partnerships","ops","other"].map(k=><option key={k} value={k}>{getCat(T,k).label}</option>)}
            </select>
            <button onClick={onDelete} style={{marginLeft:"auto",fontSize:11,padding:"5px 13px",borderRadius:20,border:`0.5px solid ${T.uOv}55`,background:"transparent",color:T.uOv,cursor:"pointer",fontFamily:"monospace"}}>× Delete</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── AddModal ───────────────────────────────────────────────────────────────
function AddModal({ onClose, onAdd }) {
  const T = useT();
  const ref = useRef(null);
  const [form, setForm] = useState({company:"",contact:"",title:"",action:"",notes:"",followUpDate:"",category:"deals",priority:"medium",recurrence:"none"});
  useEffect(()=>{ setTimeout(()=>ref.current?.focus(),60); },[]);

  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const RECUR = {daily:{type:"daily",label:"daily"},weekly:{type:"weekly",label:"weekly"},biweekly:{type:"biweekly",label:"biweekly"},monthly:{type:"monthly",label:"monthly"}};

  const handle = () => {
    if(!form.action.trim()) return;
    onAdd({id:uid(),company:form.company.trim()||null,contact:form.contact.trim()||null,title:form.title.trim()||null,action:form.action.trim(),notes:form.notes.trim()||null,followUpDate:form.followUpDate||null,priority:form.priority,category:form.category,recurrence:RECUR[form.recurrence]||null,subtasks:[],status:"not_started",createdAt:new Date().toISOString()});
    onClose();
  };

  const inp = {width:"100%",background:T.raised,border:`0.5px solid ${T.borderMd}`,borderRadius:8,padding:"9px 12px",color:T.tx,fontFamily:"monospace",fontSize:12,outline:"none"};
  const lbl = {fontSize:9,fontFamily:"monospace",color:T.tx3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5,fontWeight:700,display:"block"};

  return (
    <div style={{position:"fixed",inset:0,background:T.overlay,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:T.surface,border:`0.5px solid ${T.borderMd}`,borderRadius:18,padding:28,width:540,maxWidth:"92vw",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:10,fontFamily:"monospace",color:T.tx3,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:20,fontWeight:600}}>New Task</div>

        <div style={{marginBottom:14}}>
          <label style={lbl}>Action *</label>
          <input ref={ref} value={form.action} onChange={e=>set("action",e.target.value)} onKeyDown={e=>{if(e.key==="Escape")onClose();if(e.key==="Enter"){e.preventDefault();handle();}}} placeholder="e.g. Follow up with proposal" style={inp}/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
          <div><label style={lbl}>Company</label><input value={form.company} onChange={e=>set("company",e.target.value)} placeholder="Acme Co." style={inp}/></div>
          <div><label style={lbl}>Contact</label><input value={form.contact} onChange={e=>set("contact",e.target.value)} placeholder="Jane Smith" style={inp}/></div>
          <div><label style={lbl}>Title</label><input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="CEO" style={inp}/></div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={lbl}>Notes</label>
          <textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="Context, background…" style={{...inp,resize:"none"}}/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:22}}>
          <div>
            <label style={lbl}>Follow-up</label>
            <input type="date" value={form.followUpDate} onChange={e=>set("followUpDate",e.target.value)} style={{...inp,colorScheme:T.isDark?"dark":"light"}}/>
          </div>
          <div>
            <label style={lbl}>Category</label>
            <select value={form.category} onChange={e=>set("category",e.target.value)} style={{...inp,cursor:"pointer"}}>
              {["deals","partnerships","ops","other"].map(k=><option key={k} value={k}>{getCat(T,k).label}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Priority</label>
            <select value={form.priority} onChange={e=>set("priority",e.target.value)} style={{...inp,cursor:"pointer"}}>
              <option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
            </select>
          </div>
          <div>
            <label style={lbl}>Recurrence</label>
            <select value={form.recurrence} onChange={e=>set("recurrence",e.target.value)} style={{...inp,cursor:"pointer"}}>
              <option value="none">None</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="biweekly">Biweekly</option><option value="monthly">Monthly</option>
            </select>
          </div>
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

          <button type="button" onClick={handle} disabled={!form.action.trim()} style={{background:form.action.trim()?T.addBtn:T.raised,color:form.action.trim()?"#FFF":T.tx3,border:"none",borderRadius:11,padding:"12px 26px",fontFamily:"monospace",fontSize:13,fontWeight:700,cursor:"pointer",transition:"all 0.15s"}}>Log →</button>
        </div>
      </div>
    </div>
  );
}

// ── KanbanView ─────────────────────────────────────────────────────────────
function KanbanView({ tasks, onUpdate, onStatusChange, onDelete }) {
  const T = useT();
  const [dragOver, setDragOver] = useState(null);
  const handleDrop = (id, status) => {
    const task = tasks.find(t=>t.id===id);
    if(!task||(status==="done"&&task.subtasks?.some(s=>!s.completed))) return;
    onStatusChange(id,status); setDragOver(null);
  };
  const COLS = [{key:"not_started",label:"Not Started",c:T.sNs},{key:"in_progress",label:"In Progress",c:T.sIp},{key:"done",label:"Done",c:T.sDone}];
  return (
    <div style={{display:"flex",gap:16,alignItems:"flex-start",height:"calc(100vh - 200px)",overflow:"hidden"}}>
      {COLS.map(({key,label,c})=>{
        const colTasks = tasks.filter(t=>(t.status||"not_started")===key);
        const isOver   = dragOver===key;
        return (
          <div key={key} onDragOver={e=>{e.preventDefault();setDragOver(key);}} onDragLeave={e=>{if(!e.relatedTarget||!e.currentTarget.contains(e.relatedTarget))setDragOver(null);}} onDrop={e=>{e.preventDefault();handleDrop(e.dataTransfer.getData("taskId"),key);}} style={{flex:1,minWidth:0,background:isOver?`${c}12`:T.surface,border:`0.5px solid ${isOver?c:T.border}`,borderRadius:14,display:"flex",flexDirection:"column",overflow:"hidden",transition:"all 0.18s"}}>
            <div style={{padding:"14px 14px 13px",borderBottom:`0.5px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}><div style={{width:9,height:9,borderRadius:"50%",background:c}}/><span style={{fontSize:13,fontWeight:600,color:T.tx}}>{label}</span></div>
              <span style={{fontSize:11,color:T.tx3,fontFamily:"monospace"}}>{colTasks.length}</span>
            </div>
            <div style={{padding:"10px 10px",overflowY:"auto",flex:1}}>
              {colTasks.length===0 && <div style={{textAlign:"center",padding:"36px 10px",color:T.tx3,fontSize:12,border:`0.5px dashed ${T.border}`,borderRadius:9,marginTop:4}}>Drop tasks here</div>}
              {colTasks.map(t=><TaskCard key={t.id} task={t} onUpdate={p=>onUpdate(t.id,p)} onStatusChange={s=>onStatusChange(t.id,s)} onDelete={()=>onDelete(t.id)}/>)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── CalendarView ───────────────────────────────────────────────────────────
function CalendarView({ tasks }) {
  const T   = useT();
  const now = new Date();
  const [{year,month}, setYM] = useState({year:now.getFullYear(),month:now.getMonth()});
  const [selected, setSelected] = useState(null);

  const active      = tasks.filter(t=>t.status!=="done");
  const daysInMonth = new Date(year,month+1,0).getDate();
  const firstDay    = new Date(year,month,1).getDay();
  const todayDay    = year===now.getFullYear()&&month===now.getMonth()?now.getDate():null;

  const dayMap = {};
  active.forEach(task=>{
    const dates = new Set();
    if(task.followUpDate){ const d=new Date(task.followUpDate+"T12:00:00"); if(d.getFullYear()===year&&d.getMonth()===month) dates.add(d.getDate()); }
    recurDatesInMonth(task,year,month).forEach(d=>dates.add(d));
    dates.forEach(d=>{ if(!dayMap[d]) dayMap[d]=[]; dayMap[d].push(task); });
  });

  const nav = dir => { const d=new Date(year,month+dir,1); setYM({year:d.getFullYear(),month:d.getMonth()}); setSelected(null); };
  const selTasks = selected?(dayMap[selected]||[]):[];

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 296px",gap:24}}>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <button onClick={()=>nav(-1)} style={{background:"none",border:`0.5px solid ${T.border}`,color:T.tx2,cursor:"pointer",borderRadius:9,padding:"8px 15px",fontSize:14}}>←</button>
          <span style={{fontSize:18,fontWeight:700,color:T.tx,letterSpacing:"-0.02em"}}>{MONTHS[month]} {year}</span>
          <button onClick={()=>nav(1)} style={{background:"none",border:`0.5px solid ${T.border}`,color:T.tx2,cursor:"pointer",borderRadius:9,padding:"8px 15px",fontSize:14}}>→</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
          {WDAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:T.tx3,fontFamily:"monospace",padding:"4px 0",letterSpacing:"0.08em",fontWeight:600}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
          {Array.from({length:daysInMonth},(_,i)=>i+1).map(day=>{
            const tks=dayMap[day]||[], isToday=day===todayDay, isSel=day===selected;
            return (
              <div key={day} onClick={()=>setSelected(p=>p===day?null:day)} style={{minHeight:68,background:isSel?T.raised:T.card,border:`0.5px solid ${isSel?T.borderHi:T.border}`,borderRadius:9,padding:"7px 8px",cursor:"pointer",transition:"all 0.12s"}}>
                <div style={{fontSize:12,fontWeight:isToday?700:400,color:isToday?T.uTd:T.tx2,marginBottom:5,fontFamily:"monospace"}}>{day}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                  {tks.slice(0,7).map((t)=>{ const cat=getCat(T,t.category); return <div key={t.id} title={`${t.company||"—"}: ${t.action}`} style={{width:7,height:7,borderRadius:"50%",background:cat.dot}}/>; })}
                  {tks.length>7&&<span style={{fontSize:8,color:T.tx3,fontFamily:"monospace"}}>+{tks.length-7}</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{paddingTop:56}}>
        {selected ? (
          <>
            <div style={{fontSize:15,fontWeight:700,color:T.tx,marginBottom:4}}>{MONTHS[month]} {selected}</div>
            <div style={{fontSize:11,color:T.tx3,fontFamily:"monospace",marginBottom:18}}>{selTasks.length} task{selTasks.length!==1?"s":""}</div>
            {selTasks.map(t=>{ const cat=getCat(T,t.category); const sc={not_started:T.sNs,in_progress:T.sIp,done:T.sDone}[t.status||"not_started"]; return (
              <div key={t.id} style={{background:T.card,border:`0.5px solid ${T.border}`,borderLeft:`3px solid ${cat.dot}`,borderRadius:9,padding:"10px 12px",marginBottom:8}}>
                {t.company&&<div style={{fontSize:13,fontWeight:600,color:T.tx,marginBottom:2}}>{t.company}</div>}
                {t.contact&&<div style={{fontSize:11,color:T.tx2,marginBottom:4}}>{t.contact}{t.title?`, ${t.title}`:""}</div>}
                <div style={{fontSize:11,color:cat.c,fontFamily:"monospace",fontWeight:500}}>→ {t.action}</div>
                <div style={{display:"flex",gap:10,marginTop:6,alignItems:"center"}}>
                  {t.recurrence&&<span style={{fontSize:9,color:cat.c,fontFamily:"monospace"}}>↻ {t.recurrence.label}</span>}
                  <span style={{fontSize:9,color:sc,fontFamily:"monospace",fontWeight:600}}>{STATUS_CFG[t.status||"not_started"].label}</span>
                </div>
              </div>
            ); })}
          </>
        ) : (
          <div style={{textAlign:"center",paddingTop:50}}>
            <div style={{fontSize:36,opacity:0.12,marginBottom:12,color:T.tx}}>◷</div>
            <div style={{fontSize:12,color:T.tx3}}>Click a day to view tasks</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ListView ───────────────────────────────────────────────────────────────
function ListView({ tasks, onUpdate, onStatusChange, onDelete }) {
  const T = useT();
  const [activeCat,   setActiveCat]   = useState("all");
  const [showDone,    setShowDone]    = useState(false);
  const [showAllDone, setShowAllDone] = useState(false);

  const active    = tasks.filter(t=>t.status!=="done");
  const done      = tasks.filter(t=>t.status==="done");
  const catCounts = Object.fromEntries(["deals","partnerships","ops","other"].map(k=>[k,active.filter(t=>t.category===k).length]));

  const filtered = (activeCat==="all"?active:active.filter(t=>t.category===activeCat))
    .sort((a,b)=>URGENCY_ORDER[getUrgency(a)]-URGENCY_ORDER[getUrgency(b)]);

  const groups = ["overdue","today","week","none"].map(u=>({u,list:filtered.filter(t=>getUrgency(t)===u)})).filter(g=>g.list.length>0);
  const uLabel = {overdue:"Overdue",today:"Today",week:"This week",none:"Later"};
  const uDot   = {overdue:T.uOv,today:T.uTd,week:T.uWk,none:T.tx3};
  const tabs   = [{key:"all",label:"All",c:T.tx,n:active.length},...["deals","partnerships","ops","other"].map(k=>({key:k,label:getCat(T,k).label,c:getCat(T,k).c,n:catCounts[k]}))];

  return (
    <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 220px",gap:24}}>
      <div>
        <div style={{display:"flex",borderBottom:`0.5px solid ${T.border}`,marginBottom:22,overflowX:"auto"}}>
          {tabs.map(t=>{ const isA=activeCat===t.key; return (
            <button key={t.key} onClick={()=>setActiveCat(t.key)} style={{padding:"8px 15px",fontSize:12,fontWeight:isA?600:400,color:isA?t.c:T.tx3,background:"none",border:"none",borderBottom:`2px solid ${isA?t.c:"transparent"}`,marginBottom:-1,whiteSpace:"nowrap",cursor:"pointer",transition:"all 0.14s"}}>
              {t.label}
              {t.n>0&&<span style={{marginLeft:6,fontSize:9,fontFamily:"monospace",background:isA?t.c:T.raised,color:isA?(T.isDark?"#000":"#fff"):T.tx3,padding:"1px 6px",borderRadius:20,fontWeight:700}}>{t.n}</span>}
            </button>
          ); })}
        </div>

        {groups.map(({u,list})=>(
          <div key={u} style={{marginBottom:26}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:11}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:uDot[u]}}/>
              <span style={{fontSize:10,fontFamily:"monospace",letterSpacing:"0.14em",color:T.tx2,textTransform:"uppercase",fontWeight:600}}>{uLabel[u]}</span>
              <span style={{fontSize:10,color:T.tx3,fontFamily:"monospace"}}>· {list.length}</span>
            </div>
            {list.map(t=><TaskCard key={t.id} task={t} onUpdate={p=>onUpdate(t.id,p)} onStatusChange={s=>onStatusChange(t.id,s)} onDelete={()=>onDelete(t.id)}/>)}
          </div>
        ))}

        {filtered.length===0 && (
          <div style={{border:`0.5px dashed ${T.border}`,borderRadius:11,padding:"52px 20px",textAlign:"center",color:T.tx3,fontSize:13}}>
            {active.length===0?"Pipeline clear — press + to add a task":`No ${getCat(T,activeCat)?.label?.toLowerCase()||""} tasks`}
          </div>
        )}

        {done.length>0 && (
          <div style={{marginTop:18}}>
            <button onClick={()=>setShowDone(p=>!p)} style={{fontSize:11,padding:"4px 13px",borderRadius:20,border:`0.5px solid ${T.border}`,background:"transparent",fontFamily:"monospace",color:T.tx3,cursor:"pointer",marginBottom:11}}>
              {showDone?"▼":"▶"} Completed ({done.length})
            </button>
            {showDone&&(
              <>
                {(showAllDone?done:done.slice(0,14)).map(t=>{ const cat=getCat(T,t.category); return (
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 11px",marginBottom:4,background:T.card,borderRadius:7,opacity:0.42,borderLeft:`3px solid ${cat.dot}`}}>
                    <span style={{color:T.sDone,fontSize:12,fontWeight:600}}>✓</span>
                    <span style={{fontSize:12,color:T.tx2,fontWeight:500}}>{t.company||t.contact||"—"}</span>
                    <span style={{color:T.tx3,fontSize:10,fontFamily:"monospace"}}>· {t.action}</span>
                    <button onClick={()=>onDelete(t.id)} style={{marginLeft:"auto",background:"none",border:"none",color:T.tx3,cursor:"pointer",fontSize:14,padding:0}}>×</button>
                  </div>
                ); })}
                {done.length>14&&<button onClick={()=>setShowAllDone(p=>!p)} style={{fontSize:11,padding:"4px 13px",borderRadius:20,border:`0.5px solid ${T.border}`,background:"transparent",fontFamily:"monospace",color:T.tx3,cursor:"pointer",marginTop:4}}>{showAllDone?`Show less`:`Show ${done.length-14} more`}</button>}
              </>
            )}
          </div>
        )}
      </div>

      {/* Sidebar */}
      <div>
        <div style={{background:T.surface,border:`0.5px solid ${T.border}`,borderRadius:14,padding:18,marginBottom:14}}>
          <div style={{fontSize:10,fontFamily:"monospace",letterSpacing:"0.16em",color:T.tx3,textTransform:"uppercase",marginBottom:16,fontWeight:700}}>Pipeline</div>
          {["deals","partnerships","ops","other"].map(k=>{
            const cat=getCat(T,k), n=catCounts[k], ov=active.filter(t=>t.category===k&&getUrgency(t)==="overdue").length, isA=activeCat===k;
            return (
              <button key={k} onClick={()=>setActiveCat(isA?"all":k)} style={{display:"flex",alignItems:"center",width:"100%",padding:"9px 11px",marginBottom:4,borderRadius:9,background:isA?cat.bg:"transparent",border:`0.5px solid ${isA?cat.dot:T.border}`,cursor:"pointer",textAlign:"left",transition:"all 0.14s"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:cat.dot,flexShrink:0,marginRight:11}}/>
                <span style={{fontSize:13,color:T.tx,flex:1,fontWeight:isA?600:400}}>{cat.label}</span>
                {ov>0&&<span style={{fontSize:9,color:T.uOv,fontFamily:"monospace",marginRight:9,fontWeight:700}}>⚠ {ov}</span>}
                <span style={{fontSize:18,fontWeight:700,color:cat.c,fontFamily:"monospace"}}>{n}</span>
              </button>
            );
          })}
          <div style={{borderTop:`0.5px solid ${T.border}`,marginTop:11,paddingTop:11,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:T.tx3}}>Completed</span>
            <span style={{fontSize:18,fontWeight:700,color:T.sDone,fontFamily:"monospace"}}>{done.length}</span>
          </div>
        </div>

      </div>
    </div>
  );
}

// ── TasksPage ──────────────────────────────────────────────────────────────
function TasksPage({ tasks, onUpdate, onStatusChange, onDelete, onAdd }) {
  const T = useT();
  const [view,    setView]    = useState("list");
  const [addOpen, setAddOpen] = useState(false);

  const open    = tasks.filter(t=>t.status!=="done").length;
  const overdue = tasks.filter(t=>t.status!=="done"&&getUrgency(t)==="overdue").length;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:26}}>
        <div style={{display:"flex",background:T.surface,border:`0.5px solid ${T.border}`,borderRadius:11,padding:3,gap:2}}>
          {[{k:"list",l:"List"},{k:"kanban",l:"Board"},{k:"calendar",l:"Calendar"}].map(({k,l})=>(
            <button key={k} onClick={()=>setView(k)} style={{padding:"7px 18px",borderRadius:8,fontSize:12,fontWeight:view===k?700:400,background:view===k?T.raised:"transparent",color:view===k?T.tx:T.tx2,border:`0.5px solid ${view===k?T.borderMd:"transparent"}`,cursor:"pointer",transition:"all 0.15s"}}>{l}</button>
          ))}
        </div>
        <div style={{fontSize:11,color:T.tx3,fontFamily:"monospace"}}>
          {open} open{overdue>0?" · ":""}{overdue>0&&<span style={{color:T.uOv,fontWeight:700}}>{overdue} overdue</span>}
        </div>
      </div>

      {view==="list"     && <ListView     tasks={tasks} onUpdate={onUpdate} onStatusChange={onStatusChange} onDelete={onDelete}/>}
      {view==="kanban"   && <KanbanView   tasks={tasks} onUpdate={onUpdate} onStatusChange={onStatusChange} onDelete={onDelete}/>}
      {view==="calendar" && <CalendarView tasks={tasks}/>}

      <button type="button" onClick={()=>setAddOpen(true)} style={{position:"fixed",bottom:30,right:30,width:54,height:54,borderRadius:"50%",background:T.addBtn,color:"#FFF",border:"none",fontSize:26,fontWeight:300,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 8px 28px ${T.addBtn}80`,transition:"all 0.2s",zIndex:500,lineHeight:1}}>+</button>
      {addOpen && <AddModal onClose={()=>setAddOpen(false)} onAdd={t=>{onAdd(t);setAddOpen(false);}}/>}
    </div>
  );
}

// ── Deal Components ────────────────────────────────────────────────────────
function DealCard({ deal, tasks, onClick }) {
  const T = useT();
  const stage = STAGES.find(s=>s.key===deal.stage)||STAGES[0];

      {deal.contact&&<div style={{fontSize:11,color:T.tx2,marginBottom:4}}>{deal.contact}</div>}
      {deal.nextStep&&<div style={{fontSize:10,color:T.tx3,fontFamily:"monospace",lineHeight:1.4,marginBottom:6}}>→ {deal.nextStep}</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:2}}>

      </div>
    </div>
  );
}

function DealKanban({ deals, tasks, onMoveDeal, onUpdate, onDelete, onUpdateTask, onAddTask }) {
  const T = useT();
  const [dragOver, setDragOver] = useState(null);
  const [openDeal, setOpenDeal] = useState(null);
  const handleDrop = (stageKey, e) => { const id=e.dataTransfer.getData("dealId"); if(id) onMoveDeal(id,stageKey); setDragOver(null); };
  const modalDeal = openDeal ? deals.find(d=>d.id===openDeal) : null;
  return (
    <>
      <div style={{overflowX:"auto",paddingBottom:16}}>
        <div style={{display:"flex",gap:10,minWidth:"max-content",alignItems:"flex-start"}}>
          {STAGES.map(stage=>{
            const col = deals.filter(d=>d.stage===stage.key);
            const total = col.reduce((a,d)=>a+(d.value||0),0);
            const isOver = dragOver===stage.key;
            return (
              <div key={stage.key}
                onDragOver={e=>{e.preventDefault();setDragOver(stage.key);}}
                onDragLeave={e=>{if(!e.relatedTarget||!e.currentTarget.contains(e.relatedTarget))setDragOver(null);}}
                onDrop={e=>{e.preventDefault();handleDrop(stage.key,e);}}
                style={{width:220,flexShrink:0,background:isOver?`${stage.c}14`:T.surface,border:`0.5px solid ${isOver?stage.c:T.border}`,borderRadius:13,display:"flex",flexDirection:"column",overflow:"hidden",transition:"all 0.18s"}}
              >
                <div style={{padding:"12px 13px 10px",borderBottom:`0.5px solid ${T.border}`,flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:stage.c,flexShrink:0}}/>
                    <span style={{fontSize:12,fontWeight:700,color:T.tx,flex:1,lineHeight:1.3}}>{stage.label}</span>
                    <span style={{fontSize:10,color:T.tx3,fontFamily:"monospace"}}>{col.length}</span>
                  </div>
                  {total>0&&<div style={{fontSize:10,color:stage.c,fontFamily:"monospace",fontWeight:600}}>${total.toLocaleString()}/mo</div>}
                </div>
                <div style={{padding:"8px 8px",overflowY:"auto",flex:1,maxHeight:480}}>
                  {col.length===0&&<div style={{textAlign:"center",padding:"24px 8px",color:T.tx3,fontSize:11,border:`0.5px dashed ${T.border}`,borderRadius:8,marginTop:4,fontFamily:"monospace"}}>Drop here</div>}
                  {col.map(d=><DealCard key={d.id} deal={d} tasks={tasks} onClick={()=>setOpenDeal(d.id)}/>)}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {modalDeal&&<DealModal deal={modalDeal} tasks={tasks} onClose={()=>setOpenDeal(null)} onUpdate={p=>onUpdate(modalDeal.id,p)} onDelete={()=>onDelete(modalDeal.id)} onUpdateTask={onUpdateTask} onAddTask={onAddTask}/>}
    </>
  );
}

function DealsPage({ deals, tasks, onAdd, onUpdate, onDelete, onUpdateTask, onAddTask }) {
  const T = useT();
  const [addOpen,     setAddOpen]     = useState(false);
  const [ownerFilter, setOwnerFilter] = useState("all");
  const [stageFilter, setStageFilter] = useState("open");
  const [stalledOnly, setStalledOnly] = useState(false);

  const openDeals    = deals.filter(d=>!STAGES.find(s=>s.key===d.stage)?.closed);
  const totalVal     = openDeals.reduce((a,d)=>a+(d.value||0),0);
  const stalledCount = openDeals.filter(d=>d.isStalled).length;
  const now          = new Date();
  const wonMonth     = deals.filter(d=>d.stage==="won"&&d.closedAt&&new Date(d.closedAt).getMonth()===now.getMonth()&&new Date(d.closedAt).getFullYear()===now.getFullYear()).length;

  const moveDeal = (id,stage) => { const closed=STAGES.find(s=>s.key===stage)?.closed; onUpdate(id,{stage,closedAt:closed?new Date().toISOString():null}); };

  let filtered = [...deals];
  if(ownerFilter!=="all")   filtered = filtered.filter(d=>d.owner===ownerFilter);
  if(stalledOnly)            filtered = filtered.filter(d=>d.isStalled);
  if(stageFilter==="open")   filtered = filtered.filter(d=>!STAGES.find(s=>s.key===d.stage)?.closed);
  else if(stageFilter==="closed") filtered = filtered.filter(d=>STAGES.find(s=>s.key===d.stage)?.closed);

  const chip = (active,c=T.cDeals) => ({fontSize:11,padding:"5px 13px",borderRadius:20,border:`0.5px solid ${active?c:T.border}`,background:active?`${c}18`:"transparent",color:active?c:T.tx3,cursor:"pointer",fontFamily:"monospace",fontWeight:active?600:400,transition:"all 0.14s"});
  const div  = {width:1,height:20,background:T.border,margin:"0 4px"};

  return (
    <div>
      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        {[
          {label:"Pipeline Value", val:`$${totalVal.toLocaleString()}/mo`, c:T.cDeals},
          {label:"Open Deals",     val:openDeals.length,                   c:T.cPart},
          {label:"Stalled",        val:stalledCount,                       c:stalledCount>0?T.uOv:T.tx3},
          {label:"Won This Month", val:wonMonth,                           c:T.sDone},
        ].map(m=>(
          <div key={m.label} style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:11,padding:"14px 16px"}}>
            <div style={{fontSize:9,fontFamily:"monospace",color:T.tx3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6,fontWeight:600}}>{m.label}</div>
            <div style={{fontSize:22,fontWeight:800,color:m.c,letterSpacing:"-0.03em",fontFamily:"monospace"}}>{m.val}</div>
          </div>
        ))}
      </div>
      {/* Filters */}
      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
        <button onClick={()=>setOwnerFilter("all")}     style={chip(ownerFilter==="all")}>All owners</button>
        <button onClick={()=>setOwnerFilter("Garrett")} style={chip(ownerFilter==="Garrett")}>Garrett</button>
        <button onClick={()=>setOwnerFilter("Jeremy")}  style={chip(ownerFilter==="Jeremy")}>Jeremy</button>
        <div style={div}/>
        <button onClick={()=>setStageFilter("open")}   style={chip(stageFilter==="open")}>Open</button>
        <button onClick={()=>setStageFilter("closed")} style={chip(stageFilter==="closed")}>Closed</button>
        <button onClick={()=>setStageFilter("all")}    style={chip(stageFilter==="all")}>All stages</button>
        <div style={div}/>
        <button onClick={()=>setStalledOnly(p=>!p)} style={chip(stalledOnly,T.uOv)}>Stalled only</button>
      </div>
      <DealKanban deals={filtered} tasks={tasks} onMoveDeal={moveDeal} onUpdate={onUpdate} onDelete={onDelete} onUpdateTask={onUpdateTask} onAddTask={onAddTask}/>
      <button type="button" onClick={()=>setAddOpen(true)} style={{position:"fixed",bottom:30,right:30,width:54,height:54,borderRadius:"50%",background:T.addBtn,color:"#FFF",border:"none",fontSize:26,fontWeight:300,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 8px 28px ${T.addBtn}80`,transition:"all 0.2s",zIndex:500,lineHeight:1}}>+</button>
      {addOpen&&<AddDealModal onClose={()=>setAddOpen(false)} onAdd={d=>{onAdd(d);setAddOpen(false);}}/>}
    </div>
  );
}

// ── Root App ───────────────────────────────────────────────────────────────
function App() {
  const [isDark, setIsDark] = useState(true);
  const [page,   setPage]   = useState("tasks");
  const [tasks, setTasks] = useState(()=>{
    try { const saved=lsGet(TASKS_KEY); if(saved?.length) return saved.map(t=>({...t,status:t.status||(t.completed?"done":"not_started")})); } catch{}
    return SEED_TASKS;
  });
  const [deals, setDeals] = useState(()=>{
    try { const saved=lsGet(DEALS_KEY); if(saved?.length) return saved; } catch{}
    return SEED_DEALS;
  });
  const [toast, setToast] = useState(null);

  const T = isDark ? DARK : LIGHT;

  useEffect(()=>{ lsSet(TASKS_KEY, tasks); },[tasks]);
  useEffect(()=>{ lsSet(DEALS_KEY, deals);  },[deals]);

  const showToast = (msg, type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const addTask      = t      => { setTasks(p=>[t,...p]); showToast(`Logged → ${getCat(T,t.category).label}`); };
  const updateTask   = (id,p) => setTasks(prev=>prev.map(t=>t.id===id?{...t,...p}:t));
  const statusChange = (id,s) => setTasks(prev=>prev.map(t=>t.id===id?{...t,status:s}:t));
  const deleteTask   = id     => setTasks(prev=>prev.filter(t=>t.id!==id));

  const addDeal    = d      => { setDeals(p=>[d,...p]); showToast(`Deal added → ${d.name}`); };
  const updateDeal = (id,p) => setDeals(prev=>prev.map(d=>d.id===id?{...d,...p}:d));
  const deleteDeal = id     => setDeals(prev=>prev.filter(d=>d.id!==id));

  const openDeals = deals.filter(d=>!STAGES.find(s=>s.key===d.stage)?.closed).length;

  return (
    <ThemeCtx.Provider value={T}>
      <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:T.bg,minHeight:"100vh",color:T.tx,transition:"background 0.25s,color 0.25s"}}>
        <style>{`
          ::-webkit-scrollbar{width:4px;height:4px;}
          ::-webkit-scrollbar-track{background:transparent;}
          ::-webkit-scrollbar-thumb{background:${T.scrollbar};border-radius:2px;}
          .editable:hover{background:${T.editHover};border-radius:3px;}
          textarea::placeholder,input::placeholder{color:${T.tx3};}
          select option{background:${T.surface};color:${T.tx};}
        `}</style>

        {toast&&(
          <div style={{position:"fixed",top:16,right:16,zIndex:2000,background:toast.type==="err"?(T.isDark?"#2E0808":"#FDF0F0"):(T.isDark?"#0A2A18":"#F0FDF6"),color:toast.type==="err"?T.uOv:T.sDone,padding:"9px 18px",borderRadius:9,fontSize:12,fontWeight:600,fontFamily:"monospace",border:`0.5px solid ${toast.type==="err"?T.uOv+"50":T.sDone+"50"}`}}>
            {toast.msg}
          </div>
        )}

        {/* Nav */}
        <div style={{position:"sticky",top:0,zIndex:100,background:T.isDark?"rgba(13,12,20,0.94)":"rgba(242,241,251,0.94)",backdropFilter:"blur(12px)",borderBottom:`0.5px solid ${T.border}`,padding:"0 28px"}}>
          <div style={{display:"flex",alignItems:"center",height:56}}>
            <div style={{marginRight:36}}>
              <div style={{fontSize:9,fontFamily:"monospace",color:T.tx3,letterSpacing:"0.22em",textTransform:"uppercase",fontWeight:700,lineHeight:1}}>Insendra</div>
              <div style={{fontSize:14,fontWeight:800,color:T.tx,letterSpacing:"-0.02em",lineHeight:1.3}}>Sales Hub</div>
            </div>
            {[{k:"tasks",l:"Tasks",accent:T.cDeals},{k:"deals",l:"Deals",accent:T.cPart}].map(({k,l,accent})=>{ const isA=page===k; return (
              <button key={k} onClick={()=>setPage(k)} style={{padding:"0 18px",height:56,fontSize:13,fontWeight:isA?700:400,color:isA?accent:T.tx3,background:"none",border:"none",borderBottom:`2px solid ${isA?accent:"transparent"}`,cursor:"pointer",transition:"all 0.14s",display:"flex",alignItems:"center",gap:7}}>
                {l}
                {k==="deals"&&openDeals>0&&<span style={{fontSize:9,background:T.cPart,color:"#fff",padding:"1px 6px",borderRadius:20,fontWeight:700}}>{openDeals}</span>}
              </button>
            ); })}
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:14}}>
              <button type="button" onClick={()=>setIsDark(p=>!p)} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 13px",borderRadius:22,background:T.raised,border:`0.5px solid ${T.border}`,cursor:"pointer",color:T.tx2,fontSize:11,fontWeight:500,fontFamily:"monospace"}}>
                <span style={{fontSize:13,lineHeight:1}}>{isDark?"◑":"●"}</span>
                <span>{isDark?"Light":"Dark"}</span>
              </button>
              <span style={{fontSize:11,color:T.tx3,fontFamily:"monospace"}}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
            </div>
          </div>
        </div>

        <div style={{padding:"28px 28px 60px"}}>
          {page==="tasks" && <TasksPage tasks={tasks} onUpdate={updateTask} onStatusChange={statusChange} onDelete={deleteTask} onAdd={addTask}/>}
          {page==="deals" && <DealsPage deals={deals} tasks={tasks} onAdd={addDeal} onUpdate={updateDeal} onDelete={deleteDeal} onUpdateTask={updateTask} onAddTask={addTask}/>}
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
